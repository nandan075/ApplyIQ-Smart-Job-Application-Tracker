<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ApplyIQ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;700;800&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div id="root">
      <div id="app-loader" style="
        position: fixed; inset: 0; z-index: 99999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: linear-gradient(135deg, #06104c 0%, #1e2761 50%, #39427d 100%);
        font-family: 'Plus Jakarta Sans', 'Hanken Grotesk', system-ui, sans-serif;
        color: #ffffff; overflow: hidden;
      ">
        <style>
          @keyframes loader-pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.08); opacity: 0.85; } }
          @keyframes loader-shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(200%); } }
          @keyframes loader-fade-in { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
          @keyframes loader-glow { 0%, 100% { box-shadow: 0 0 20px rgba(253, 187, 62, 0.3); } 50% { box-shadow: 0 0 40px rgba(253, 187, 62, 0.6); } }
          #app-loader .loader-brand {
            display: flex; align-items: center; gap: 16px;
            animation: loader-pulse 2s ease-in-out infinite, loader-fade-in 0.6s ease-out both;
          }
          #app-loader .loader-mark {
            width: 56px; height: 56px; border-radius: 14px;
            background: linear-gradient(135deg, #fdbb3e 0%, #f59e0b 100%);
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 20px; color: #06104c; letter-spacing: -0.5px;
            animation: loader-glow 2s ease-in-out infinite;
          }
          #app-loader .loader-title { font-size: 32px; font-weight: 800; letter-spacing: -1px; }
          #app-loader .loader-subtitle {
            margin-top: 16px; font-size: 14px; color: rgba(255,255,255,0.5);
            animation: loader-fade-in 0.6s ease-out 0.3s both;
          }
          #app-loader .loader-bar-track {
            margin-top: 32px; width: 200px; height: 3px; border-radius: 3px;
            background: rgba(255,255,255,0.1); overflow: hidden;
            animation: loader-fade-in 0.6s ease-out 0.5s both;
          }
          #app-loader .loader-bar-fill {
            width: 50%; height: 100%; border-radius: 3px;
            background: linear-gradient(90deg, transparent, #fdbb3e, transparent);
            animation: loader-shimmer 1.5s ease-in-out infinite;
          }
        </style>
        <div class="loader-brand">
          <div class="loader-mark">AIQ</div>
          <span class="loader-title">ApplyIQ</span>
        </div>
        <p class="loader-subtitle">Preparing your career workspace&hellip;</p>
        <div class="loader-bar-track"><div class="loader-bar-fill"></div></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
